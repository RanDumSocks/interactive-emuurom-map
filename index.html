<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Interactive Emuurom Map</title>
      <style>
         :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --toolbar-bg: rgba(40, 40, 40, 0.9);
            --border-subtle: rgba(255, 255, 255, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --btn-bg: transparent;
            --btn-bg-hover: rgba(255, 255, 255, 0.1);
            --btn-active-bg: rgba(255, 255, 255, 0.15);
            --btn-active-border: rgba(255, 255, 255, 0.4);
            --btn-active-text: #ffffff;
            --btn-active-hover-bg: rgba(255, 255, 255, 0.25);
            --grid-internal: rgba(255, 255, 255, 0.6);
            --grid-outer: rgba(255, 87, 87, 0.8);
            --grid-shadow: rgba(0, 0, 0, 0.3);
            --label-color: rgba(255, 255, 255, 0.9);
            --label-shadow: rgba(0, 0, 0, 0.8);
            --hover-box-border: rgba(255, 255, 255, 0.8);
            --hover-box-bg: rgba(255, 255, 255, 0.2);
            --remove-btn-color: #ff5252;
         }

         body,
         html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
         }

         #torus-grid {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            touch-action: none;
         }

         #torus-grid.cursor-pan {
            cursor: grab;
         }

         #torus-grid.cursor-pan-active {
            cursor: grabbing;
         }

         #torus-grid.cursor-pencil {
            cursor: crosshair;
         }

         #torus-grid.cursor-erase {
            cursor: cell;
         }

         #top-toolbar-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
         }

         #right-toolbar-container {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
         }

         #paint-btn-container {
            padding: 10px;
         }

         #paint-menu,
         #paint-controls-menu,
         #paint-actions-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            max-height: 0;
            padding: 0 10px;
            margin-top: 0;
            opacity: 0;
            transform: translateX(100px);
            overflow: hidden;
            transition: max-height 0.3s ease, margin-top 0.3s ease, transform 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
         }

         #paint-menu.show,
         #paint-controls-menu.show,
         #paint-actions-menu.show {
            max-height: 200px;
            padding: 10px;
            margin-top: 15px;
            opacity: 1;
            transform: translateX(0);
         }

         #tile-selection-menu {
            position: absolute;
            right: 100%;
            margin-right: 15px;
            display: flex;
            gap: 10px;
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            padding: 10px;
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
         }

         #tile-selection-menu.show {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
         }

         .toolbar-panel {
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            user-select: none;
         }

         #toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            user-select: none;
            transition: all 0.3s ease;
         }

         #map-toolbar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            user-select: none;
         }

         #icon-size-slider {
            width: 0;
            opacity: 0;
            margin-left: -15px;
            pointer-events: none;
            transition: width 0.3s ease, opacity 0.3s ease, margin-left 0.3s ease;
         }

         #icon-size-slider.show {
            width: 100px;
            opacity: 1;
            margin-left: 0;
            pointer-events: auto;
         }

         .tile-wrapper {
            position: absolute;
            box-sizing: border-box;
            transform-origin: top left;
         }

         .tile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            user-select: none;
            image-rendering: pixelated;
         }

         .coord-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--label-color);
            font-weight: bold;
            font-size: 1.5em;
            text-shadow: 1px 1px 3px var(--label-shadow);
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
         }

         #torus-grid.hide-labels .coord-label {
            opacity: 0;
         }

         .grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-sizing: border-box;
            transition: border-color 0.2s ease-in-out;
            filter: drop-shadow(0px 0px 2px var(--grid-shadow));
         }

         #torus-grid.hide-minor-grid {
            --grid-internal: transparent;
         }

         #torus-grid.hide-major-grid {
            --grid-outer: transparent;
         }

         .tool-btn {
            background-color: var(--btn-bg);
            border: 1px solid var(--border-subtle);
            color: var(--text-color);
            border-radius: 6px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            transition:
               background-color 0.2s,
               border-color 0.2s;
            padding: 0;
         }

         .tool-btn:hover {
            background-color: var(--btn-bg-hover);
         }

         .tool-btn.active {
            background-color: var(--btn-active-bg);
            border-color: var(--btn-active-border);
            color: var(--btn-active-text);
         }

         .tool-btn.active:hover {
            background-color: var(--btn-active-hover-bg);
         }

         .tool-btn img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            image-rendering: pixelated;
            pointer-events: none;
         }

         #object-menu {
            position: absolute;
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 10px;
            display: none;
            gap: 10px;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            z-index: 200;
         }

         .object-btn {
            background-color: var(--btn-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition:
               background-color 0.2s,
               border-color 0.2s;
         }

         .object-btn:hover {
            background-color: var(--btn-bg-hover);
         }

         .object-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            pointer-events: none;
         }

         #hover-box {
            position: absolute;
            top: 0;
            left: 0;
            box-sizing: border-box;
            border: 2px solid var(--hover-box-border);
            background-color: var(--hover-box-bg);
            backdrop-filter: invert(100%);
            pointer-events: none;
            display: none;
            z-index: 50;
            transform-origin: top left;
         }

         .placed-object {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 60;
            image-rendering: pixelated;
         }

         .placed-tile {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 40;
            image-rendering: pixelated;
            transform-origin: top left;
         }

         #torus-grid.hide-all-tiles:not(.paint-mode-active) .placed-tile {
            display: none;
         }

         #torus-grid.current-map-ow .map-fc {
            display: none;
         }

         #torus-grid.current-map-fc .map-ow {
            display: none;
         }

         #hover-box.paint-preview {
            border: none;
            background-color: transparent;
            backdrop-filter: none;
         }

         #github-link {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            text-decoration: none;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            z-index: 100;
            transition: background-color 0.2s, border-color 0.2s;
         }

         #github-link:hover {
            background-color: var(--btn-bg-hover);
         }

         #github-link svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
         }

         #copyright-info {
            position: absolute;
            top: 20px;
            left: 74px;
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            height: 44px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: var(--text-color);
            font-size: 0.9em;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            z-index: 100;
            user-select: none;
         }

         #version-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--toolbar-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            height: 44px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: var(--text-color);
            font-size: 0.9em;
            box-shadow: 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(4px);
            z-index: 100;
            user-select: none;
         }
      </style>
   </head>
   <body>
      <div id="torus-grid" class="current-map-ow">
         <div id="hover-box"></div>
      </div>

      <a id="github-link" href="https://github.com/RanDumSocks/interactive-emuurom-map" target="_blank" rel="noopener noreferrer" title="View source on GitHub">
         <svg viewBox="0 0 16 16">

         </svg>
      </a>

      <div id="copyright-info">&copy; Justin Chance | AGPLv3</div>

      <div id="version-info">v<span id="build-number"></span></div>

      <div id="top-toolbar-container">
         <div id="top-toolbar" class="toolbar-panel"></div>
         <div id="top-tiles-toolbar" class="toolbar-panel">
            <button id="toggle-tiles-btn" class="tool-btn active" title="Toggle All Tiles"></button>
         </div>
         <div id="top-actions-toolbar" class="toolbar-panel">
            <button id="import-btn" class="tool-btn active" title="Import Objects (JSON)">&#128449;</button>
            <button id="export-btn" class="tool-btn active" title="Export Objects (JSON)">&#128427;</button>
            <button id="clear-all-btn" class="tool-btn" title="Clear All Objects">&#128465;</button>
         </div>
      </div>

      <div id="toolbar">
         <button id="toggle-coords-btn" class="tool-btn active" title="Toggle Coordinates">&#128065;</button>
         <button id="toggle-minor-btn" class="tool-btn active" title="Toggle Minor Grid">&#8862;</button>
         <button id="toggle-major-btn" class="tool-btn active" title="Toggle Major Grid">&#9723;</button>
         <button id="resize-btn" class="tool-btn" title="Resize Icons">&#128207;</button>
         <input type="range" id="icon-size-slider" min="16" max="128" step="1" value="32">
      </div>
      
      <div id="map-toolbar">
         <button id="toggle-map-btn" class="tool-btn active" title="Toggle Map Version (OW/FC)">OW</button>
      </div>

      <div id="object-menu"></div>

      <div id="right-toolbar-container">
         <div id="paint-btn-container" class="toolbar-panel">
            <button id="paint-mode-btn" class="tool-btn" title="Toggle Paint Mode">&#128396;</button>
         </div>
         <div id="paint-menu"></div>
         <div id="paint-controls-menu">
            <button id="pan-btn" class="tool-btn active" title="Pan Tool">&#9995;</button>
            <button id="pencil-btn" class="tool-btn" title="Pencil Tool">&#9998;</button>
            <button id="erase-btn" class="tool-btn" title="Erase Tool">&#9003;</button>
         </div>
         <div id="paint-actions-menu">
            <button id="import-tiles-btn" class="tool-btn active" title="Import Tiles (JSON)">&#128449;</button>
            <button id="export-tiles-btn" class="tool-btn active" title="Export Tiles (JSON)">&#128427;</button>
            <button id="clear-tiles-btn" class="tool-btn" title="Clear All Tiles">&#128465;</button>
         </div>
         <div id="tile-selection-menu"></div>
      </div>

      <script src="./constants.js"></script>
      <script>
         // Base map dimensions and grid configurations
         const tileW = 240 * 2;
         const tileH = 136 * 2;
         const cols = 8;
         const rows = 8;
         const totalW = tileW * cols;
         const totalH = tileH * rows;
         const subTileW = tileW / 30;
         const subTileH = tileH / 17;
         let iconSize = 32;

         const container = document.getElementById("torus-grid");
         const objectMenu = document.getElementById("object-menu");
         const hoverBox = document.getElementById("hover-box");
         const topToolbar = document.getElementById("top-toolbar");
         const paintModeBtn = document.getElementById("paint-mode-btn");
         const paintMenu = document.getElementById("paint-menu");
         const tileSelectionMenu = document.getElementById("tile-selection-menu");
         const paintControlsMenu = document.getElementById("paint-controls-menu");
         const paintActionsMenu = document.getElementById("paint-actions-menu");
         const panBtn = document.getElementById("pan-btn");
         const pencilBtn = document.getElementById("pencil-btn");
         const eraseBtn = document.getElementById("erase-btn");

         if (typeof MAJOR_NUMBER !== 'undefined' && typeof MINOR_NUMBER !== 'undefined' && typeof BUILD_NUMBER !== 'undefined') {
            document.getElementById("build-number").innerText = `${MAJOR_NUMBER}.${MINOR_NUMBER}.${BUILD_NUMBER}`;
         } else {
            document.getElementById("version-info").style.display = 'none';
         }

         const objectTypes = [
            { id: "salavia", name: "Salavia", image: "images/objects/salavia.png" },
            { id: "admin", name: "Admin", image: "images/objects/admin.png" },
            { id: "kapalike", name: "Kapalike", image: "images/objects/kapalike.png" },
            { id: "kilippari2", name: "Kilippari", image: "images/objects/kilippari2.png" },
            { id: "kilippari", name: "Grey Kilippari", image: "images/objects/kilippari.png" },
            { id: "hattu", name: "Hattu", image: "images/objects/hattu.png" },
            { id: "tonttu", name: "Tonttu", image: "images/objects/tonttu.png" },
         ];

         const tileTypes = [
            { id: "solid-block", name: "Solid Block", image: "images/objects/solid-block.png" },
            { id: "platform", name: "Platform", image: "images/objects/platform.png" }
         ];

         let placedObjects = JSON.parse(localStorage.getItem("placedObjects")) || [];
         const objectElements = [];

         let paintedTiles = JSON.parse(localStorage.getItem("paintedTiles")) || [];
         const paintedTileElements = [];

         const createPaintedTileElement = (tileData) => {
            const tType = tileTypes.find((t) => t.id === tileData.objectId);
            if (!tType || typeof tileData.mapX !== "number" || typeof tileData.mapY !== "number" || typeof tileData.tileX !== "number" || typeof tileData.tileY !== "number") return false;

            const el = document.createElement("img");
            el.src = tType.image;
            el.classList.add("placed-tile");
            el.classList.add(`tile-${tileData.objectId}`);
            el.classList.add(`map-${tileData.mapType || "ow"}`);
            el.style.width = `${subTileW}px`;
            el.style.height = `${subTileH}px`;
            el.draggable = false;
            container.appendChild(el);
            paintedTileElements.push({ data: tileData, el: el });
            return true;
         };

         const createObjectElement = (objData) => {
            const objType = objectTypes.find((t) => t.id === objData.objectId);
            if (!objType || typeof objData.mapX !== "number" || typeof objData.mapY !== "number" || typeof objData.tileX !== "number" || typeof objData.tileY !== "number") return false;

            const el = document.createElement("img");
            el.src = objType.image;
            el.classList.add("placed-object");
            el.classList.add(`object-${objData.objectId}`);
            el.classList.add(`map-${objData.mapType || "ow"}`);
            el.style.width = `${iconSize}px`;
            el.style.height = `${iconSize}px`;
            el.draggable = false;
            container.appendChild(el);
            objectElements.push({ data: objData, el: el });
            return true;
         };

         const removeObjectAt = (mapX, mapY, tileX, tileY, mapType) => {
            placedObjects = placedObjects.filter((o) => {
               const objMapType = o.mapType || "ow";
               if (o.mapX === mapX && o.mapY === mapY && o.tileX === tileX && o.tileY === tileY && objMapType === mapType) {
                  const objElIndex = objectElements.findIndex((oe) => oe.data === o);
                  if (objElIndex !== -1) {
                     const elToRemove = objectElements[objElIndex].el;
                     if (elToRemove.parentNode) elToRemove.parentNode.removeChild(elToRemove);
                     objectElements.splice(objElIndex, 1);
                  }
                  return false;
               }
               return true;
            });
         };

         let currentClickLocation = null;
         let mouseX = 0, mouseY = 0;
         let isPointerOver = false;

         const dynamicStyles = document.createElement("style");
         document.head.appendChild(dynamicStyles);

         // Build visibility toggle toolbar dynamically
         objectTypes.forEach((obj) => {
            dynamicStyles.innerHTML += `#torus-grid.hide-${obj.id} .object-${obj.id} { display: none; }\n`;

            const btn = document.createElement("button");
            btn.classList.add("tool-btn", "active");
            btn.title = `Toggle ${obj.name}`;

            const img = document.createElement("img");
            img.src = obj.image;
            img.alt = obj.name;

            btn.appendChild(img);

            btn.addEventListener("click", () => {
               btn.classList.toggle("active");
               container.classList.toggle(`hide-${obj.id}`);
            });

            topToolbar.appendChild(btn);
         });

         // Build tile visibility toggle button
         const toggleTilesBtn = document.getElementById("toggle-tiles-btn");
         const toggleTilesImg = document.createElement("img");
         toggleTilesImg.src = tileTypes[0].image;
         toggleTilesBtn.appendChild(toggleTilesImg);
         
         toggleTilesBtn.addEventListener("click", () => {
            toggleTilesBtn.classList.toggle("active");
            container.classList.toggle("hide-all-tiles");
         });

         let isPaintMode = false;
         let selectedPaintTile = tileTypes[0].id;

         let isSpacebarDown = false;
         let isSpacePanActive = false;

         const updateCursor = () => {
            container.classList.remove("cursor-pan", "cursor-pan-active", "cursor-pencil", "cursor-erase");
            const effectiveTool = (isPaintMode && !isSpacePanActive) ? currentPaintTool : "pan";
            
            if (effectiveTool === "pan") {
               container.classList.add(isDragging ? "cursor-pan-active" : "cursor-pan");
            } else if (effectiveTool === "pencil") {
               container.classList.add("cursor-pencil");
            } else if (effectiveTool === "erase") {
               container.classList.add("cursor-erase");
            }
         };

         paintModeBtn.addEventListener("click", () => {
            isPaintMode = !isPaintMode;
            paintModeBtn.classList.toggle("active", isPaintMode);
            paintMenu.classList.toggle("show", isPaintMode);
            paintControlsMenu.classList.toggle("show", isPaintMode);
            paintActionsMenu.classList.toggle("show", isPaintMode);
            if (!isPaintMode) {
               tileSelectionMenu.classList.remove("show");
            }
            container.classList.toggle("paint-mode-active", isPaintMode);
            updateCursor();
         });

         const tileSelectBtn = document.createElement("button");
         tileSelectBtn.classList.add("tool-btn");
         tileSelectBtn.title = `Selected Tile: ${tileTypes[0].name}`;

         const tileSelectImg = document.createElement("img");
         tileSelectImg.src = tileTypes[0].image;
         tileSelectImg.alt = tileTypes[0].name;

         tileSelectBtn.appendChild(tileSelectImg);

         tileSelectBtn.addEventListener("click", () => {
            const isShowing = tileSelectionMenu.classList.contains("show");
            if (!isShowing) {
               tileSelectionMenu.style.top = `${tileSelectBtn.offsetTop + paintMenu.offsetTop - 10}px`;
            }
            tileSelectionMenu.classList.toggle("show");
         });

         paintMenu.appendChild(tileSelectBtn);

         // Build tile selection menu dynamically
         tileTypes.forEach((tile) => {
            const btn = document.createElement("button");
            btn.classList.add("tool-btn");
            if (tile.id === selectedPaintTile) {
               btn.classList.add("active");
            }
            btn.title = `Select ${tile.name}`;

            const img = document.createElement("img");
            img.src = tile.image;
            img.alt = tile.name;

            btn.appendChild(img);

            btn.addEventListener("click", () => {
               selectedPaintTile = tile.id;
               tileSelectImg.src = tile.image;
               tileSelectImg.alt = tile.name;
               tileSelectBtn.title = `Selected Tile: ${tile.name}`;

               Array.from(tileSelectionMenu.children).forEach((child) => child.classList.remove("active"));
               btn.classList.add("active");

               tileSelectionMenu.classList.remove("show");
            });

            tileSelectionMenu.appendChild(btn);
         });

         let currentPaintTool = "pan";

         const selectPaintTool = (tool) => {
            currentPaintTool = tool;
            panBtn.classList.toggle("active", tool === "pan");
            pencilBtn.classList.toggle("active", tool === "pencil");
            eraseBtn.classList.toggle("active", tool === "erase");
            updateCursor();
         };

         panBtn.addEventListener("click", () => selectPaintTool("pan"));
         pencilBtn.addEventListener("click", () => selectPaintTool("pencil"));
         eraseBtn.addEventListener("click", () => selectPaintTool("erase"));

         // Build object selection menu
         objectTypes.forEach((obj) => {
            const btn = document.createElement("button");
            btn.classList.add("object-btn");
            btn.title = obj.name;

            const img = document.createElement("img");
            img.src = obj.image;
            img.alt = obj.name;

            btn.appendChild(img);

            btn.addEventListener("click", () => {
               if (currentClickLocation) {
                  const { mapX, mapY, tileX, tileY, mapType } = currentClickLocation;

                  removeObjectAt(mapX, mapY, tileX, tileY, mapType);

                  const newObj = {
                     mapX,
                     mapY,
                     tileX,
                     tileY,
                     objectId: obj.id,
                     mapType
                  };
                  placedObjects.push(newObj);
                  localStorage.setItem("placedObjects", JSON.stringify(placedObjects));
                  createObjectElement(newObj);
                  updatePlacedObjects();
               }
               objectMenu.style.display = "none";
            });

            objectMenu.appendChild(btn);
         });

         // Build remove object button
         const removeBtn = document.createElement("button");
         removeBtn.classList.add("object-btn");
         removeBtn.title = "Remove Object";
         removeBtn.innerHTML = '<span style="color: var(--remove-btn-color); font-weight: bold; font-size: 24px; pointer-events: none;">&#10006;</span>';
         removeBtn.style.display = "none";

         removeBtn.addEventListener("click", () => {
            if (currentClickLocation) {
               const { mapX, mapY, tileX, tileY, mapType } = currentClickLocation;
               removeObjectAt(mapX, mapY, tileX, tileY, mapType);
               localStorage.setItem("placedObjects", JSON.stringify(placedObjects));
            }
            objectMenu.style.display = "none";
         });
         objectMenu.appendChild(removeBtn);

         placedObjects = placedObjects.filter(createObjectElement);
         localStorage.setItem("placedObjects", JSON.stringify(placedObjects));

         paintedTiles = paintedTiles.filter(createPaintedTileElement);
         localStorage.setItem("paintedTiles", JSON.stringify(paintedTiles));

         // Hide object menu when clicking outside
         window.addEventListener("pointerdown", (e) => {
            if (objectMenu.style.display !== "none" && !objectMenu.contains(e.target) && e.button !== 2) {
               objectMenu.style.display = "none";
            }
            if (tileSelectionMenu.classList.contains("show") && !tileSelectionMenu.contains(e.target) && !tileSelectBtn.contains(e.target)) {
               tileSelectionMenu.classList.remove("show");
            }
         });

         // Calculate minimum scale to ensure the grid always covers the screen + 1 extra wrapping tile
         const getMinScale = () => {
            const rect = container.getBoundingClientRect();
            const minScaleX = rect.width / (totalW - tileW);
            const minScaleY = rect.height / (totalH - tileH);
            return Math.max(minScaleX, minScaleY);
         };

         const addOrReplacePaintedTile = (mapX, mapY, tileX, tileY, mapType, tileId) => {
            let existingIndex = paintedTiles.findIndex(t => t.mapX === mapX && t.mapY === mapY && t.tileX === tileX && t.tileY === tileY && (t.mapType || "ow") === mapType);
            
            if (existingIndex !== -1) {
               if (paintedTiles[existingIndex].objectId === tileId) return;
               
               const elIndex = paintedTileElements.findIndex(pe => pe.data === paintedTiles[existingIndex]);
               if (elIndex !== -1) {
                  const elToRemove = paintedTileElements[elIndex].el;
                  if (elToRemove.parentNode) elToRemove.parentNode.removeChild(elToRemove);
                  paintedTileElements.splice(elIndex, 1);
               }
               paintedTiles.splice(existingIndex, 1);
            }
            
            const newTile = { mapX, mapY, tileX, tileY, objectId: tileId, mapType };
            paintedTiles.push(newTile);
            localStorage.setItem("paintedTiles", JSON.stringify(paintedTiles));
            createPaintedTileElement(newTile);
            updatePaintedTiles();
         };

         const removePaintedTileAt = (mapX, mapY, tileX, tileY, mapType) => {
            let existingIndex = paintedTiles.findIndex(t => t.mapX === mapX && t.mapY === mapY && t.tileX === tileX && t.tileY === tileY && (t.mapType || "ow") === mapType);
            
            if (existingIndex !== -1) {
               const elIndex = paintedTileElements.findIndex(pe => pe.data === paintedTiles[existingIndex]);
               if (elIndex !== -1) {
                  const elToRemove = paintedTileElements[elIndex].el;
                  if (elToRemove.parentNode) elToRemove.parentNode.removeChild(elToRemove);
                  paintedTileElements.splice(elIndex, 1);
               }
               paintedTiles.splice(existingIndex, 1);
               localStorage.setItem("paintedTiles", JSON.stringify(paintedTiles));
            }
         };

         const paintOrEraseAtMouse = (e) => {
            const rect = container.getBoundingClientRect();
            const localMouseX = e.clientX - rect.left;
            const localMouseY = e.clientY - rect.top;
            
            const worldX = (localMouseX - currentPanX) / currentScale;
            const worldY = (localMouseY - currentPanY) / currentScale;

            const { mapX, mapY, tileX, tileY } = getWorldToGridCoords(worldX, worldY);
            
            if (currentPaintTool === "pencil") {
               addOrReplacePaintedTile(mapX, mapY, tileX, tileY, currentMap, selectedPaintTile);
            } else if (currentPaintTool === "erase") {
               removePaintedTileAt(mapX, mapY, tileX, tileY, currentMap);
            }
         };

         let currentPanX = 0,
            currentPanY = 0,
            currentScale = Math.max(1.0, getMinScale());
         let targetPanX = 0,
            targetPanY = 0,
            targetScale = currentScale;
         const friction = 0.15;

         let isDragging = false;
         let isPaintingOrErasing = false;
         let startX, startY;
         const tiles = [];
         let currentMap = "ow";

         updateCursor();

         // 8x8 grid
         for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
               const wrapper = document.createElement("div");
               wrapper.classList.add("tile-wrapper");
               wrapper.style.width = `${tileW}px`;
               wrapper.style.height = `${tileH}px`;

               const img = document.createElement("img");

               img.src = `images/${currentMap}/${currentMap}_${r + 1}-${c + 1}.png`;
               img.classList.add("tile-image");
               img.draggable = false;

               wrapper.appendChild(img);

               // Map overlay / grid lines
               const borderOverlay = document.createElement("div");
               borderOverlay.classList.add("grid-overlay");

               const internalEdge = "2px dashed var(--grid-internal)";
               const outerEdge = "3px solid var(--grid-outer)";

               borderOverlay.style.borderRight = internalEdge;
               borderOverlay.style.borderBottom = internalEdge;

               if (r === 0) borderOverlay.style.borderTop = outerEdge;
               if (c === 0) borderOverlay.style.borderLeft = outerEdge;

               wrapper.appendChild(borderOverlay);

               // Label in the center of the grid
               const label = document.createElement("div");
               label.innerText = `${r + 1}-${c + 1}`;
               label.classList.add("coord-label");
               wrapper.appendChild(label);

               container.appendChild(wrapper);
               tiles.push({ el: wrapper, img: img, c, r });
            }
         }

         // Toolbar Options Logic
         const toggleCoordsBtn = document.getElementById("toggle-coords-btn");
         toggleCoordsBtn.addEventListener("click", () => {
            toggleCoordsBtn.classList.toggle("active");
            if (toggleCoordsBtn.classList.contains("active")) {
               container.classList.remove("hide-labels");
            } else {
               container.classList.add("hide-labels");
            }
         });

         const toggleMinorBtn = document.getElementById("toggle-minor-btn");
         toggleMinorBtn.addEventListener("click", () => {
            toggleMinorBtn.classList.toggle("active");
            if (toggleMinorBtn.classList.contains("active")) {
               container.classList.remove("hide-minor-grid");
            } else {
               container.classList.add("hide-minor-grid");
            }
         });

         const toggleMajorBtn = document.getElementById("toggle-major-btn");
         toggleMajorBtn.addEventListener("click", () => {
            toggleMajorBtn.classList.toggle("active");
            if (toggleMajorBtn.classList.contains("active")) {
               container.classList.remove("hide-major-grid");
            } else {
               container.classList.add("hide-major-grid");
            }
         });

         const clearAllBtn = document.getElementById("clear-all-btn");
         clearAllBtn.addEventListener("click", () => {
            if (confirm("Are you sure you want to remove all placed map markers? This action cannot be undone.")) {
               placedObjects = [];
               localStorage.removeItem("placedObjects");
               objectElements.forEach((obj) => {
                  if (obj.el.parentNode) obj.el.parentNode.removeChild(obj.el);
               });
               objectElements.length = 0;
            }
         });

         const toggleMapBtn = document.getElementById("toggle-map-btn");
         toggleMapBtn.addEventListener("click", () => {
            container.classList.remove(`current-map-${currentMap}`);
            currentMap = currentMap === "ow" ? "fc" : "ow";
            container.classList.add(`current-map-${currentMap}`);
            toggleMapBtn.innerText = currentMap.toUpperCase();
            tiles.forEach((tile) => {
               tile.img.src = `images/${currentMap}/${currentMap}_${tile.r + 1}-${tile.c + 1}.png`;
            });
         });

         const importBtn = document.getElementById("import-btn");
         importBtn.addEventListener("click", () => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = (e) => {
               const file = e.target.files[0];
               if (!file) return;
               const reader = new FileReader();
               reader.onload = (readerEvent) => {
                  try {
                     const parsed = JSON.parse(readerEvent.target.result);
                     if (Array.isArray(parsed)) {
                        let objectsAdded = false;

                        parsed.forEach((importedObj) => {
                           const impMapType = importedObj.mapType || "ow";
                           const conflict = placedObjects.some(
                              (o) => o.mapX === importedObj.mapX && o.mapY === importedObj.mapY && o.tileX === importedObj.tileX && o.tileY === importedObj.tileY && (o.mapType || "ow") === impMapType
                           );

                           if (!conflict) {
                              if (createObjectElement(importedObj)) {
                                 placedObjects.push(importedObj);
                                 objectsAdded = true;
                              }
                           }
                        });

                        if (objectsAdded) {
                           localStorage.setItem("placedObjects", JSON.stringify(placedObjects));
                           updatePlacedObjects();
                        }
                     } else {
                        alert("Invalid file format. Expected a JSON array.");
                     }
                  } catch (err) {
                     alert("Error parsing JSON file.");
                  }
               };
               reader.readAsText(file);
            };
            input.click();
         });

         const exportBtn = document.getElementById("export-btn");
         exportBtn.addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(placedObjects, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const downloadAnchorNode = document.createElement("a");
            downloadAnchorNode.href = url;
            downloadAnchorNode.download = "emuurom-map-objects.json";
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            URL.revokeObjectURL(url);
         });

         const importTilesBtn = document.getElementById("import-tiles-btn");
         importTilesBtn.addEventListener("click", () => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = (e) => {
               const file = e.target.files[0];
               if (!file) return;
               const reader = new FileReader();
               reader.onload = (readerEvent) => {
                  try {
                     const parsed = JSON.parse(readerEvent.target.result);
                     if (Array.isArray(parsed)) {
                        let tilesAdded = false;

                        parsed.forEach((importedTile) => {
                           const impMapType = importedTile.mapType || "ow";
                           const conflict = paintedTiles.some(
                              (t) => t.mapX === importedTile.mapX && t.mapY === importedTile.mapY && t.tileX === importedTile.tileX && t.tileY === importedTile.tileY && (t.mapType || "ow") === impMapType
                           );

                           if (!conflict) {
                              if (createPaintedTileElement(importedTile)) {
                                 paintedTiles.push(importedTile);
                                 tilesAdded = true;
                              }
                           }
                        });

                        if (tilesAdded) {
                           localStorage.setItem("paintedTiles", JSON.stringify(paintedTiles));
                           updatePaintedTiles();
                        }
                     } else {
                        alert("Invalid file format. Expected a JSON array.");
                     }
                  } catch (err) {
                     alert("Error parsing JSON file.");
                  }
               };
               reader.readAsText(file);
            };
            input.click();
         });

         const exportTilesBtn = document.getElementById("export-tiles-btn");
         exportTilesBtn.addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(paintedTiles, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const downloadAnchorNode = document.createElement("a");
            downloadAnchorNode.href = url;
            downloadAnchorNode.download = "emuurom-map-tiles.json";
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            URL.revokeObjectURL(url);
         });

         const clearTilesBtn = document.getElementById("clear-tiles-btn");
         clearTilesBtn.addEventListener("click", () => {
            if (confirm("Are you sure you want to remove all painted tiles? This action cannot be undone.")) {
               paintedTiles = [];
               localStorage.removeItem("paintedTiles");
               paintedTileElements.forEach((tile) => {
                  if (tile.el.parentNode) tile.el.parentNode.removeChild(tile.el);
               });
               paintedTileElements.length = 0;
            }
         });

         const resizeBtn = document.getElementById("resize-btn");
         const iconSizeSlider = document.getElementById("icon-size-slider");

         resizeBtn.addEventListener("click", () => {
            resizeBtn.classList.toggle("active");
            iconSizeSlider.classList.toggle("show");
         });

         iconSizeSlider.addEventListener("input", (e) => {
            iconSize = parseInt(e.target.value, 10);
            objectElements.forEach((obj) => {
               obj.el.style.width = `${iconSize}px`;
               obj.el.style.height = `${iconSize}px`;
            });
            updatePlacedObjects();
         });

         const updatePositions = () => {
            const scaledTotalW = totalW * currentScale;
            const scaledTotalH = totalH * currentScale;
            const scaledTileW = tileW * currentScale;
            const scaledTileH = tileH * currentScale;

            tiles.forEach((tile) => {
               let x = (((tile.c * scaledTileW + currentPanX) % scaledTotalW) + scaledTotalW) % scaledTotalW;
               let y = (((tile.r * scaledTileH + currentPanY) % scaledTotalH) + scaledTotalH) % scaledTotalH;

               if (x > scaledTotalW - scaledTileW) x -= scaledTotalW;
               if (y > scaledTotalH - scaledTileH) y -= scaledTotalH;

               tile.el.style.transform = `translate(${x}px, ${y}px) scale(${currentScale})`;
               tile.currentX = x;
               tile.currentY = y;
            });
         };

         const getWorldToGridCoords = (worldX, worldY) => {
            const wrappedWorldX = ((worldX % totalW) + totalW) % totalW;
            const wrappedWorldY = ((worldY % totalH) + totalH) % totalH;

            const mapC = Math.floor(wrappedWorldX / tileW);
            const mapR = Math.floor(wrappedWorldY / tileH);
            const localX = wrappedWorldX % tileW;
            const localY = wrappedWorldY % tileH;

            const tileC = Math.floor(localX / subTileW);
            const tileR = Math.floor(localY / subTileH);
            
            return { mapC, mapR, mapX: mapC + 1, mapY: mapR + 1, tileC, tileR, tileX: tileC, tileY: tileR };
         };

         const updateHoverBox = () => {
            if (isPointerOver && !isDragging) {
               const worldX = (mouseX - currentPanX) / currentScale;
               const worldY = (mouseY - currentPanY) / currentScale;

               const { mapC, mapR, tileC, tileR } = getWorldToGridCoords(worldX, worldY);

               // direct lookup for the tile
               const parentTile = tiles[mapR * cols + mapC];
               if (parentTile && parentTile.currentX !== undefined) {
                  const hoverScreenX = parentTile.currentX + tileC * subTileW * currentScale;
                  const hoverScreenY = parentTile.currentY + tileR * subTileH * currentScale;

                  hoverBox.style.display = "block";
                  hoverBox.style.width = `${subTileW * currentScale}px`;
                  hoverBox.style.height = `${subTileH * currentScale}px`;
                  hoverBox.style.transform = `translate(${hoverScreenX}px, ${hoverScreenY}px)`;
                  
                  const effectiveTool = (isPaintMode && !isSpacePanActive) ? currentPaintTool : "pan";
                  if (effectiveTool === "pencil") {
                     const selectedTileType = tileTypes.find(t => t.id === selectedPaintTile);
                     if (selectedTileType) {
                        hoverBox.classList.add("paint-preview");
                        hoverBox.style.backgroundImage = `url(${selectedTileType.image})`;
                        hoverBox.style.backgroundSize = '100% 100%';
                        hoverBox.style.imageRendering = 'pixelated';
                     }
                  } else {
                     hoverBox.classList.remove("paint-preview");
                     hoverBox.style.backgroundImage = 'none';
                  }
               }
            } else {
               hoverBox.style.display = "none";
            }
         };

         const updatePlacedObjects = () => {
            objectElements.forEach((obj) => {
               const mapC = obj.data.mapX - 1;
               const mapR = obj.data.mapY - 1;
               const parentTile = tiles[mapR * cols + mapC];
               if (parentTile && parentTile.currentX !== undefined) {
                  const localCenterX = (obj.data.tileX * subTileW + subTileW / 2) * currentScale;
                  const localCenterY = (obj.data.tileY * subTileH + subTileH / 2) * currentScale;
                  const screenX = parentTile.currentX + localCenterX - iconSize / 2;
                  const screenY = parentTile.currentY + localCenterY - iconSize / 2;

                  obj.el.style.transform = `translate(${screenX}px, ${screenY}px)`;
               }
            });
         };

         const updatePaintedTiles = () => {
            paintedTileElements.forEach((tile) => {
               const mapC = tile.data.mapX - 1;
               const mapR = tile.data.mapY - 1;
               const parentTile = tiles[mapR * cols + mapC];
               if (parentTile && parentTile.currentX !== undefined) {
                  const screenX = parentTile.currentX + (tile.data.tileX * subTileW) * currentScale;
                  const screenY = parentTile.currentY + (tile.data.tileY * subTileH) * currentScale;

                  tile.el.style.transform = `translate(${screenX}px, ${screenY}px) scale(${currentScale})`;
               }
            });
         };

         updatePositions();
         updatePlacedObjects();
         updatePaintedTiles();

         // Adjust min zoom dynamically if the window is resized
         window.addEventListener("resize", () => {
            const minScale = getMinScale();
            if (targetScale < minScale) {
               const centerX = window.innerWidth / 2;
               const centerY = window.innerHeight / 2;
               const actualZoom = minScale / targetScale;
               targetPanX = centerX - (centerX - targetPanX) * actualZoom;
               targetPanY = centerY - (centerY - targetPanY) * actualZoom;
               targetScale = minScale;
            }
         });

         const renderLoop = () => {
            currentPanX += (targetPanX - currentPanX) * friction;
            currentPanY += (targetPanY - currentPanY) * friction;
            currentScale += (targetScale - currentScale) * friction;

            const diff =
               Math.abs(targetPanX - currentPanX) +
               Math.abs(targetPanY - currentPanY) +
               Math.abs(targetScale - currentScale);
               
            // Only update DOM styles if the map is still moving or being dragged
            if (diff > 0.005 || isDragging || isPaintingOrErasing) {
               updatePositions();
               updatePlacedObjects();
               updatePaintedTiles();
            }
            
            // Hover box must update continuously to track mouse movement
            updateHoverBox();

            requestAnimationFrame(renderLoop);
         };

         renderLoop();

         // Mouse / Pointer Dragging Logic
         container.addEventListener("pointerdown", (e) => {
            if (e.button === 0 || e.button === 1 || e.pointerType === "touch") {
               const effectiveTool = (isPaintMode && !isSpacePanActive) ? currentPaintTool : "pan";
               if (e.button === 0 && (effectiveTool === "pencil" || effectiveTool === "erase")) {
                  isPaintingOrErasing = true;
                  paintOrEraseAtMouse(e);
               } else {
                  isDragging = true;
                  startX = e.clientX;
                  startY = e.clientY;
                  if (e.button === 1) e.preventDefault();
               }
               updateCursor();
            }
         });

         const stopDrag = () => {
            isDragging = false;
            isPaintingOrErasing = false;
            updateCursor();
         };

         window.addEventListener("pointerup", stopDrag);
         container.addEventListener("pointerleave", (e) => {
            isPointerOver = false;
            stopDrag();
         });

         container.addEventListener("pointerenter", () => {
            isPointerOver = true;
         });

         container.addEventListener("pointermove", (e) => {
            const rect = container.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            isPointerOver = true;

            if (isPaintingOrErasing) {
               paintOrEraseAtMouse(e);
               return;
            }

            if (!isDragging) return;
            e.preventDefault();

            targetPanX += e.clientX - startX;
            targetPanY += e.clientY - startY;

            startX = e.clientX;
            startY = e.clientY;
         });

         // Right click for object selection menu (Tile coordinates)
         container.addEventListener("contextmenu", (e) => {
            e.preventDefault();

            // Translate screen coordinates to unscaled world coordinates
            const rect = container.getBoundingClientRect();
            const worldX = (e.clientX - rect.left - currentPanX) / currentScale;
            const worldY = (e.clientY - rect.top - currentPanY) / currentScale;

            const { mapX, mapY, tileX, tileY } = getWorldToGridCoords(worldX, worldY);

            console.log(`Map Clicked -> mapX: ${mapX}, mapY: ${mapY}, tileX: ${tileX}, tileY: ${tileY}, mapType: ${currentMap}`);
            currentClickLocation = { mapX, mapY, tileX, tileY, mapType: currentMap };

            const hasExistingObject = placedObjects.some(
               (o) => o.mapX === mapX && o.mapY === mapY && o.tileX === tileX && o.tileY === tileY && (o.mapType || "ow") === currentMap
            );
            removeBtn.style.display = hasExistingObject ? "flex" : "none";

            objectMenu.style.display = "flex";
            objectMenu.style.left = `${e.clientX}px`;
            objectMenu.style.top = `${e.clientY + 10}px`;
         });

         window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !isSpacebarDown) {
               isSpacebarDown = true;
               if (e.target.tagName !== "INPUT" && e.target.tagName !== "TEXTAREA") {
                  e.preventDefault();
               }
               if (isPaintMode) {
                  isSpacePanActive = true;
                  updateCursor();
               }
            }
         });

         window.addEventListener("keyup", (e) => {
            if (e.code === "Space") {
               isSpacebarDown = false;
               if (isSpacePanActive) {
                  isSpacePanActive = false;
                  updateCursor();
               }
            }
         });

         window.addEventListener("blur", () => {
            isSpacebarDown = false;
            isSpacePanActive = false;
            stopDrag();
         });

         // Mouse Wheel Zoom / Panning Logic
         container.addEventListener(
            "wheel",
            (e) => {
               e.preventDefault();

               if (e.ctrlKey || e.metaKey) {
                  const rect = container.getBoundingClientRect();
                  const localMouseX = e.clientX - rect.left;
                  const localMouseY = e.clientY - rect.top;

                  const zoomFactor = Math.exp(-e.deltaY * 0.002);
                  const minScale = getMinScale();
                  const newTargetScale = Math.min(
                     Math.max(targetScale * zoomFactor, minScale),
                     Math.max(3.0, minScale),
                  );
                  const actualZoom = newTargetScale / targetScale;

                  targetPanX = localMouseX - (localMouseX - targetPanX) * actualZoom;
                  targetPanY = localMouseY - (localMouseY - targetPanY) * actualZoom;
                  targetScale = newTargetScale;
               } else {
                  if (e.shiftKey && e.deltaX === 0) {
                     targetPanX -= e.deltaY;
                  } else {
                     targetPanX -= e.deltaX;
                     targetPanY -= e.deltaY;
                  }
               }
            },
            { passive: false },
         );
      </script>
   </body>
</html>
